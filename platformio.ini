; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
; default_envs = esp32ota
default_envs = esp32dev

[env:native]
platform = native
test_framework = unity
test_build_src = yes
build_flags = -Itest/mock -std=c++11
build_src_filter = -<*>

[env:esp32dev]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
build_src_filter = +<*> -<test/>
build_flags = !python3 scripts/hydrate_build_flags.py OTA_PASSWORD TZ_STRING
extra_scripts =
    pre:scripts/gen_tagmap.py
    pre:scripts/inject_serial_port.py
    ; pre:scripts/compress_html.py
board_build.partitions = partitions.csv
monitor_speed = 115200
lib_deps =
    tzapu/WiFiManager@2.0.17
    adafruit/Adafruit PN532@1.3.4
    adafruit/Adafruit BusIO@1.17.4

[env:esp32ota]
extends = env:esp32dev
extra_scripts =
    pre:scripts/gen_tagmap.py
    pre:scripts/inject_serial_port.py
    pre:scripts/inject_ota_auth.py
    ; pre:scripts/compress_html.py
upload_protocol = espota
; must add IP=, PORT=, and OTA_PASSWORD= in .env
