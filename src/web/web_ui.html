<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arrow Badge Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      margin: 0;
      padding: 1.5rem;
    }
    h1 { margin: 0 0 1.5rem; font-size: 1.4rem; }
    .badge-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .badge-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      transition: background 0.3s, border-color 0.3s;
    }
    @keyframes scan-flash {
      0%   { background: #1e5c35; border-color: #3daa5e; box-shadow: 0 0 0 3px rgba(61,170,94,0.25); }
      17%  { background: #1a3020; border-color: #2a5a38; box-shadow: 0 0 0 2px rgba(61,170,94,0.12); }
      89%  { background: #1a3020; border-color: #2a5a38; box-shadow: 0 0 0 2px rgba(61,170,94,0.12); }
      100% { background: #2a2a2a; border-color: #3a3a3a; box-shadow: none; }
    }
    .badge-row.active { animation: scan-flash 7s ease-out forwards; }
    .slot { font-weight: 600; min-width: 2rem; color: #888; }
    .uid { font-family: monospace; font-size: 0.85rem; color: #aaa; flex: 1; }
    .label { flex: 2; font-size: 0.9rem; }
    .label.unmapped { color: #666; font-style: italic; }
    .row-actions { display: flex; gap: 0.4rem; }
    .link-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: #88aaff;
      font-size: 0.8rem;
    }
    .link-btn:hover { background: #1a2a4a; border-color: #88aaff; }
    .remove-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: #e05555;
      font-size: 0.8rem;
    }
    .remove-btn:hover { background: #3a1a1a; border-color: #e05555; }
    .empty-msg { color: #666; font-style: italic; }
    .ws-badge {
      font-size: 0.72rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .ws-badge.connected { background: #1a3a1a; border-color: #2a7a2a; color: #4caf50; }
    .ws-badge.disconnected { background: #2e1a1a; border-color: #5a2a2a; color: #e05555; }

    /* Shared modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal-overlay.visible { display: flex; }
    .modal {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .modal h2 { margin: 0 0 1rem; font-size: 1.1rem; }
    .modal p { margin: 0 0 0.4rem; font-size: 0.9rem; color: #bbb; }
    .modal .uid-display {
      font-family: monospace;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      color: #e0e0e0;
    }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
    .btn {
      padding: 0.4rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn-primary { background: #0066cc; color: #fff; }
    .btn-primary:hover { background: #0077ee; }
    .btn-secondary { background: #3a3a3a; color: #ccc; }
    .btn-secondary:hover { background: #444; }

    /* Link modal extras */
    .link-modal { max-width: 420px; }
    .link-search {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 0.45rem 0.6rem;
      color: #e0e0e0;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
      outline: none;
    }
    .link-search:focus { border-color: #555; }
    .link-results {
      max-height: 320px;
      overflow-y: auto;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
    }
    .link-item {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .link-item:last-child { border-bottom: none; }
    .link-item:hover { background: #333; }
    .link-item.special { color: #aaa; font-style: italic; }
    .link-item.artist { font-weight: 500; }
    .link-item .expand-icon { color: #666; font-size: 0.75rem; }
    .link-item.album { padding-left: 1.5rem; color: #ccc; font-size: 0.85rem; }
    .link-item.album:hover { background: #2e2e2e; color: #fff; }
    .link-results-empty { padding: 0.75rem; color: #666; font-size: 0.85rem; font-style: italic; text-align: center; }
    .header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.5rem; }
    .header h1 { margin: 0; }
    .btn-danger { background: none; border: 1px solid #663333; border-radius: 4px; padding: 0.3rem 0.75rem; cursor: pointer; color: #e05555; font-size: 0.8rem; }
    .btn-danger:hover { background: #3a1a1a; border-color: #e05555; }
  </style>
</head>
<body>
  <div class="header">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <h1>Arrow Badge Manager</h1>
      <span id="ws-status" class="ws-badge disconnected">disconnected</span>
    </div>
    <button class="btn-danger" onclick="openClearModal()">Clear Quickplay</button>
  </div>
  <div id="badges" class="badge-list"><p class="empty-msg">Loading...</p></div>

  <!-- Clear confirmation modal -->
  <div id="clear-overlay" class="modal-overlay">
    <div class="modal">
      <h2>Clear Quickplay List?</h2>
      <p>This will remove all quickplay entries from the Pi server. Registered badges will remain but will be unlinked.</p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="clear-dismiss">Cancel</button>
        <button class="btn" style="background:#8b0000;color:#fff;" id="clear-confirm">Clear</button>
      </div>
    </div>
  </div>

  <!-- Register badge modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <h2>Register Badge?</h2>
      <p>Badge detected:</p>
      <div id="modal-uid" class="uid-display"></div>
      <p>This will be registered as slot <strong id="modal-slot"></strong>.</p>
      <div id="modal-quickplay" style="margin-bottom:0.5rem;font-size:0.85rem;color:#aaa;"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-dismiss">Dismiss</button>
        <button class="btn btn-primary" id="modal-register">Register</button>
      </div>
    </div>
  </div>

  <!-- Link badge modal -->
  <div id="link-overlay" class="modal-overlay">
    <div class="modal link-modal">
      <h2>Link Badge <span id="link-slot-label"></span></h2>
      <input type="text" class="link-search" id="link-search" placeholder="Search artists…" autocomplete="off" spellcheck="false">
      <div id="link-results" class="link-results"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="link-dismiss">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    let badges = [];
    let quickplay = [];
    let pendingUID = null;
    let linkSlot = -1;
    let allArtists = null;
    let albumCache = {};

    // ── Data loading ──────────────────────────────────────────────────────────

    async function loadData() {
      try {
        const [br, qr] = await Promise.all([
          fetch('/api/badges'),
          fetch('/api/quickplay')
        ]);
        badges = br.ok ? (await br.json()).badges : [];
        const qdata = qr.ok ? (await qr.json()) : null;
        console.log('[quickplay] GET response:', JSON.stringify(qdata));
        if (Array.isArray(qdata)) {
          quickplay = qdata;
        } else {
          quickplay = qdata ? (qdata.quickplay || []) : [];
        }
      } catch (e) {
        badges = [];
        quickplay = [];
      }
      render();
    }

    function qpLabel(entry) {
      if (!entry) return null;
      if (entry.shuffle) return 'Shuffle all';
      if (!entry.artist) return null;
      return entry.album ? `${entry.artist} / ${entry.album}` : entry.artist;
    }

    // ── Badge list render ─────────────────────────────────────────────────────

    function render() {
      const container = document.getElementById('badges');
      if (badges.length === 0) {
        container.innerHTML = '<p class="empty-msg">No badges registered. Scan a badge to register it.</p>';
        return;
      }
      container.innerHTML = badges.map((uid, i) => {
        const label = qpLabel(quickplay[i]);
        return `<div class="badge-row" id="badge-${i}">
          <span class="slot">#${i}</span>
          <span class="uid">${uid}</span>
          <span class="label${label ? '' : ' unmapped'}">${label || '(unlinked)'}</span>
          <div class="row-actions">
            <button class="link-btn" onclick="openLinkModal(${i})">Link Music</button>
            <button class="remove-btn" onclick="removeBadge(${i})">Remove</button>
          </div>
        </div>`;
      }).join('');
    }

    async function removeBadge(index) {
      await fetch('/api/badges/' + index, { method: 'DELETE' });
      await loadData();
    }

    // ── Clear modal ───────────────────────────────────────────────────────────

    function openClearModal() {
      document.getElementById('clear-overlay').classList.add('visible');
    }
    document.getElementById('clear-dismiss').addEventListener('click', () => {
      document.getElementById('clear-overlay').classList.remove('visible');
    });
    document.getElementById('clear-confirm').addEventListener('click', async () => {
      document.getElementById('clear-overlay').classList.remove('visible');
      await fetch('/api/quickplay', { method: 'DELETE' });
      await loadData();
    });

    // ── Register modal ────────────────────────────────────────────────────────

    document.getElementById('modal-register').addEventListener('click', async () => {
      if (!pendingUID) return;
      await fetch('/api/badges', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid: pendingUID })
      });
      pendingUID = null;
      document.getElementById('modal-overlay').classList.remove('visible');
      await loadData();
    });

    document.getElementById('modal-dismiss').addEventListener('click', () => {
      pendingUID = null;
      document.getElementById('modal-overlay').classList.remove('visible');
    });

    // ── Link modal ────────────────────────────────────────────────────────────

    async function openLinkModal(slotIndex) {
      linkSlot = slotIndex;
      document.getElementById('link-slot-label').textContent = '#' + slotIndex;
      document.getElementById('link-search').value = '';
      document.getElementById('link-results').innerHTML = '<div class="link-results-empty">Loading artists…</div>';
      document.getElementById('link-overlay').classList.add('visible');
      document.getElementById('link-search').focus();

      if (!allArtists) {
        try {
          const res = await fetch('/api/artists');
          const data = res.ok ? await res.json() : null;
          allArtists = data ? (data.artists || []).sort() : [];
        } catch (e) {
          allArtists = [];
        }
      }
      renderLinkResults('');
    }

    document.getElementById('link-dismiss').addEventListener('click', () => {
      document.getElementById('link-overlay').classList.remove('visible');
    });

    document.getElementById('link-search').addEventListener('input', (e) => {
      renderLinkResults(e.target.value);
    });

    function renderLinkResults(query) {
      const container = document.getElementById('link-results');
      const q = query.trim().toLowerCase();
      const filtered = q
        ? allArtists.filter(a => a.toLowerCase().includes(q))
        : allArtists;

      if (filtered.length === 0) {
        container.innerHTML = '<div class="link-results-empty">No artists found</div>';
        return;
      }

      let html = '<div class="link-item special" onclick="selectEntry({shuffle:true})">Shuffle all</div>';
      for (const artist of filtered) {
        const cached = albumCache[artist]; // undefined=not fetched, null=error, []=no albums, [...]=has albums
        const expanded = cached !== undefined;
        html += `<div class="link-item artist" onclick="toggleArtist(this,'${escapeAttr(artist)}')">
          <span>${escapeHtml(artist)}</span>
          <span class="expand-icon">${expanded ? '▾' : '▸'}</span>
        </div>`;
        if (expanded) {
          html += albumRows(artist, cached);
        }
      }
      container.innerHTML = html;
    }

    async function toggleArtist(el, artist) {
      if (albumCache[artist] !== undefined) {
        delete albumCache[artist];
        renderLinkResults(document.getElementById('link-search').value);
        return;
      }
      el.querySelector('.expand-icon').textContent = '…';
      try {
        const encoded = encodeURIComponent(artist);
        const res = await fetch('/api/artists/' + encoded + '/albums');
        console.log('[albums]', artist, res.status, res.ok);
        if (res.ok) {
          const data = await res.json();
          console.log('[albums] data:', data);
          albumCache[artist] = data.albums || [];
        } else {
          albumCache[artist] = null; // error sentinel — allows retry on next click
        }
      } catch (e) {
        console.error('[albums] fetch error:', e);
        albumCache[artist] = null;
      }
      renderLinkResults(document.getElementById('link-search').value);
    }

    function albumRows(artist, albums) {
      if (albums === null) {
        return `<div class="link-item album" style="color:#e05555;cursor:default">Failed to load albums — check console</div>`;
      }
      let html = `<div class="link-item album" onclick="selectEntry({artist:'${escapeAttr(artist)}',album:null,shuffle:false})">
        All albums by ${escapeHtml(artist)}
      </div>`;
      for (const album of albums) {
        html += `<div class="link-item album" onclick="selectEntry({artist:'${escapeAttr(artist)}',album:'${escapeAttr(album)}',shuffle:false})">
          ${escapeHtml(album)}
        </div>`;
      }
      return html;
    }

    async function selectEntry(entry) {
      document.getElementById('link-overlay').classList.remove('visible');
      const res = await fetch('/api/quickplay/' + linkSlot, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(entry)
      });
      if (!res.ok) {
        console.error('[quickplay] PUT failed:', res.status, await res.text());
        alert('Failed to save quickplay entry (slot ' + linkSlot + '). Check serial log for details.');
      }
      await loadData();
    }

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escapeAttr(s) {
      return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────

    function connectWS() {
      const ws = new WebSocket('ws://' + location.host + '/ws');
      const statusEl = document.getElementById('ws-status');

      ws.addEventListener('open', () => {
        statusEl.textContent = 'connected';
        statusEl.className = 'ws-badge connected';
      });

      ws.addEventListener('close', () => {
        statusEl.textContent = 'disconnected';
        statusEl.className = 'ws-badge disconnected';
        setTimeout(connectWS, 2000);
      });

      ws.addEventListener('message', (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        if (msg.type === 'badge_scan') {
          const row = document.getElementById('badge-' + msg.index);
          if (row) {
            row.classList.add('active');
            setTimeout(() => row.classList.remove('active'), 7000);
          }
        } else if (msg.type === 'unknown_badge') {
          pendingUID = msg.uid;
          const slot = badges.length;
          document.getElementById('modal-uid').textContent = msg.uid;
          document.getElementById('modal-slot').textContent = '#' + slot;
          const qp = quickplay[slot];
          const label = qpLabel(qp);
          document.getElementById('modal-quickplay').textContent =
            label ? 'Quickplay entry: ' + label : '';
          document.getElementById('modal-overlay').classList.add('visible');
        }
      });
    }

    loadData();
    connectWS();
  </script>
</body>
</html>
