<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Arrow Badge Manager</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    button { -webkit-user-select: none; user-select: none; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #1a1a1a;
      color: #e0e0e0;
      margin: 0;
      padding: 1.5rem;
    }
    h1 { margin: 0 0 1.5rem; font-size: 1.4rem; }
    .badge-list { display: flex; flex-direction: column; gap: 0.5rem; }
    .badge-row {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.75rem;
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      padding: 0.6rem 0.8rem;
      transition: background 0.3s, border-color 0.3s;
    }
    @keyframes scan-flash {
      0%   { background: #1e5c35; border-color: #3daa5e; box-shadow: 0 0 0 3px rgba(61,170,94,0.25); }
      17%  { background: #1a3020; border-color: #2a5a38; box-shadow: 0 0 0 2px rgba(61,170,94,0.12); }
      89%  { background: #1a3020; border-color: #2a5a38; box-shadow: 0 0 0 2px rgba(61,170,94,0.12); }
      100% { background: #2a2a2a; border-color: #3a3a3a; box-shadow: none; }
    }
    .badge-row.active { animation: scan-flash 7s ease-out forwards; }
    .slot { font-weight: 600; min-width: 2rem; color: #888; }
    .uid { font-family: monospace; font-size: 0.85rem; color: #aaa; flex: 1; }
    .label { flex: 2; font-size: 0.9rem; }
    .label.unmapped { color: #666; font-style: italic; }
    .label.loading { color: #888; font-style: italic; display: inline-flex; align-items: center; gap: 0.4rem; }
    .spinner {
      display: inline-block;
      width: 0.85em;
      height: 0.85em;
      border: 2px solid #444;
      border-top-color: #88aaff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .row-actions { display: flex; flex-wrap: wrap; gap: 0.4rem; margin-left: auto; }
    .link-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: #88aaff;
      font-size: 0.8rem;
    }
    .link-btn:hover { background: #1a2a4a; border-color: #88aaff; }
    .play-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: #88cc88;
      font-size: 0.8rem;
    }
    .play-btn:hover { background: #1a3a1a; border-color: #88cc88; }
    .remove-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.2rem 0.5rem;
      cursor: pointer;
      color: #e05555;
      font-size: 0.8rem;
    }
    .remove-btn:hover { background: #3a1a1a; border-color: #e05555; }
    .empty-msg { color: #666; font-style: italic; }
    .ws-badge {
      font-size: 0.72rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      font-weight: 500;
      border: 1px solid transparent;
    }
    .ws-badge.connected { background: #1a3a1a; border-color: #2a7a2a; color: #4caf50; }
    .ws-badge.disconnected { background: #2e1a1a; border-color: #5a2a2a; color: #e05555; }
    .ip-badge {
      font-size: 0.72rem;
      padding: 0.18rem 0.55rem;
      border-radius: 999px;
      border: 1px solid #3a3a3a;
      background: #222;
      color: #9aa;
      font-family: monospace;
    }
    .stereo-badge {
      font-size: 0.8rem;
      padding: 0.25rem 0.7rem;
      border-radius: 999px;
      font-weight: 500;
      border: 1px solid transparent;
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
    }
    .stereo-badge.on { background: #1a3a1a; border-color: #2a7a2a; color: #4caf50; }
    .stereo-badge.off { background: #2e1a1a; border-color: #5a2a2a; color: #e05555; }
    .stereo-badge.unknown { background: #2a2a1a; border-color: #5a5a2a; color: #d0b050; }
    .stereo-badge.error { background: #2e1a1a; border-color: #7a2a2a; color: #ff7676; }
    .stereo-badge.checking { background: #22262e; border-color: #3a4453; color: #9ab; }

    /* Shared modal styles */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }
    .modal-overlay.visible { display: flex; overscroll-behavior: contain; }
    /* Lock page scroll while any modal is open so it can't scroll behind. */
    body:has(.modal-overlay.visible) { overflow: hidden; }
    .modal {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      border-radius: 8px;
      padding: 1.5rem;
      max-width: 360px;
      width: 90%;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .modal h2 { margin: 0 0 1rem; font-size: 1.1rem; }
    .modal p { margin: 0 0 0.4rem; font-size: 0.9rem; color: #bbb; }
    .modal .uid-display {
      font-family: monospace;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      padding: 0.3rem 0.5rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      color: #e0e0e0;
    }
    .modal-actions { display: flex; gap: 0.5rem; justify-content: flex-end; margin-top: 1rem; }
    .btn {
      padding: 0.4rem 1rem;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.9rem;
    }
    .btn:disabled { opacity: 0.6; cursor: default; }
    .btn-primary { background: #0066cc; color: #fff; }
    .btn-primary:hover { background: #0077ee; }
    .btn-secondary { background: #3a3a3a; color: #ccc; }
    .btn-secondary:hover { background: #444; }

    /* Link modal extras */
    .link-modal { max-width: 420px; }
    .link-search {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 0.45rem 0.6rem;
      color: #e0e0e0;
      font-size: 0.9rem;
      margin-bottom: 0.75rem;
      outline: none;
    }
    .link-search:focus { border-color: #555; }
    .link-results {
      max-height: 320px;
      overflow-y: auto;
      overscroll-behavior: contain;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
    }
    .link-item {
      padding: 0.5rem 0.75rem;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid #333;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .link-item:last-child { border-bottom: none; }
    .link-item:hover { background: #333; }
    .link-item.special { color: #aaa; font-style: italic; }
    .link-item.artist { font-weight: 500; }
    .link-item .expand-icon { color: #666; font-size: 0.75rem; }
    .link-item.album { padding-left: 1.5rem; color: #ccc; font-size: 0.85rem; }
    .link-item.album:hover { background: #2e2e2e; color: #fff; }
    .link-item.selected { background: #143e63; }
    .link-item.selected:hover { background: #1a4d78; }
    .link-item .check { color: #4da3ff; font-size: 0.8rem; width: 1rem; text-align: center; }

    /* Selection tray */
    .link-tray {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.75rem;
    }
    .link-tray:empty { display: none; }
    .tray-chip {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: #143e63;
      border: 1px solid #1f5a8c;
      border-radius: 999px;
      padding: 0.25rem 0.35rem 0.25rem 0.7rem;
      font-size: 0.8rem;
      color: #e0e0e0;
    }
    .tray-chip button {
      background: none;
      border: none;
      color: #9cc7ef;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 0.15rem;
    }
    .tray-chip button:hover { color: #fff; }
    .link-results-empty { padding: 0.75rem; color: #666; font-size: 0.85rem; font-style: italic; text-align: center; }
    .header { display: flex; align-items: baseline; flex-wrap: wrap; gap: 0.75rem; justify-content: space-between; margin-bottom: 1.5rem; }
    .header h1 { margin: 0; }
    .btn-danger { background: none; border: 1px solid #663333; border-radius: 4px; padding: 0.3rem 0.75rem; cursor: pointer; color: #e05555; font-size: 0.8rem; }
    .btn-danger:hover { background: #3a1a1a; border-color: #e05555; }

    /* IR Controller */
    .section-title { font-size: 1rem; font-weight: 600; color: #999; margin: 0 0 0.75rem; letter-spacing: 0.04em; text-transform: uppercase; }
    .ir-grid { display: flex; flex-wrap: wrap; align-items: center; gap: 0.5rem; margin-bottom: 1.5rem; }
    .ir-class { font-size: 0.75rem; font-weight: 600; color: #666; margin: 0; text-transform: uppercase; letter-spacing: 0.05em; width: 100%; }
    .ir-btn {
      background: none;
      border: 1px solid #444;
      border-radius: 4px;
      padding: 0.35rem 0.8rem;
      cursor: pointer;
      color: #e0e0e0;
      font-size: 0.85rem;
    }
    .ir-btn:hover { background: #2a2a2a; border-color: #888; }
    .ir-btn:active { background: #333; }
    .ir-btn.sending { opacity: 0.5; pointer-events: none; }

    /* Settings cog */
    .icon-btn {
      background: none;
      border: 1px solid #3a3a3a;
      border-radius: 6px;
      width: 2.2rem; height: 2.2rem;
      cursor: pointer;
      color: #ccc;
      font-size: 1.1rem;
      line-height: 1;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn:hover { background: #2a2a2a; border-color: #888; color: #fff; }

    /* Settings modal */
    .settings-modal { max-width: 420px; max-height: 85vh; overflow-y: auto; overscroll-behavior: contain; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; gap: 0.75rem; margin-bottom: 1rem; }
    .modal-header h2 { margin: 0; }
    .modal-x {
      background: none;
      border: none;
      color: #999;
      font-size: 1.6rem;
      line-height: 1;
      cursor: pointer;
      padding: 0 0.25rem;
      flex-shrink: 0;
    }
    .modal-x:hover { color: #fff; }
    .settings-section { margin-bottom: 1.25rem; }
    .settings-section:last-of-type { margin-bottom: 0.5rem; }
    .settings-label {
      font-size: 0.75rem; font-weight: 600; color: #888;
      text-transform: uppercase; letter-spacing: 0.05em;
      margin: 0 0 0.6rem;
    }
    .settings-row { display: flex; align-items: center; gap: 0.75rem; flex-wrap: wrap; }

    /* Sensor config panel (its own view within the settings modal) */
    .sensor-config {
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }
    .cfg-field { display: flex; flex-direction: column; gap: 0.25rem; font-size: 0.85rem; color: #bbb; }
    .cfg-field > span { color: #999; }
    .cfg-field input[type="text"], .cfg-field input[type="number"] {
      background: #1a1a1a;
      border: 1px solid #3a3a3a;
      border-radius: 4px;
      padding: 0.4rem 0.5rem;
      color: #e0e0e0;
      font-size: 0.9rem;
      outline: none;
      width: 100%;
    }
    .cfg-field input:focus { border-color: #555; }
    .cfg-check { flex-direction: row; align-items: center; gap: 0.5rem; color: #e0e0e0; font-size: 0.9rem; }
    .cfg-check input { width: auto; }
    .cfg-tune-row { display: flex; gap: 0.5rem; align-items: stretch; }
    .cfg-tune-row input { flex: 1; }
    .tune-btn { white-space: nowrap; }
    .tune-btn:disabled, #sensor-save-btn:disabled { opacity: 0.5; cursor: default; }
    .sensor-msg { font-size: 0.8rem; color: #9aa; margin: 0.2rem 0 0; min-height: 1em; }
    .sensor-msg.error { color: #e05555; }

    /* Mobile: drop action buttons to their own row */
    @media (max-width: 600px) {
      body { padding: 1rem; }
      .badge-row .row-actions { flex-basis: 100%; margin-left: 0; }
    }
  </style>
</head>
<body>
  <div class="header">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <h1>Arrow Badge Manager</h1>
      <span id="ws-status" class="ws-badge disconnected">disconnected</span>
      <span id="device-ip" class="ip-badge" style="display:none"></span>
    </div>
    <button class="icon-btn" id="settings-btn" onclick="openSettings()" aria-label="Settings" title="Settings">&#9881;</button>
  </div>
  <div id="ir-controller" style="display:none">
    <p class="section-title">Controller</p>
    <div id="ir-grid" class="ir-grid"></div>
  </div>

  <p class="section-title" style="margin-bottom:0.75rem">Badges</p>
  <div id="badges" class="badge-list"><p class="empty-msg">Loading...</p></div>

  <!-- Settings modal -->
  <div id="settings-overlay" class="modal-overlay">
    <div class="modal settings-modal">
      <div class="modal-header">
        <h2 id="settings-title">Settings</h2>
        <button class="modal-x" id="settings-corner-btn" onclick="settingsCornerAction()" aria-label="Close">&times;</button>
      </div>

      <!-- Main settings view -->
      <div id="settings-main">
        <div class="settings-section">
          <p class="settings-label">Stereo</p>
          <div class="settings-row">
            <button class="btn btn-secondary" id="stereo-check-btn" onclick="checkStereo()">Check Status</button>
            <span id="stereo-status" class="stereo-badge" style="display:none"></span>
          </div>
          <button class="btn btn-secondary" id="configure-sensor-btn" onclick="showSensorConfig()" style="margin-top:0.6rem;">Configure Sensor</button>
        </div>

        <div class="settings-section">
          <p class="settings-label">Quickplay</p>
          <button class="btn-danger" onclick="confirmClearQuickplay()">Clear Quickplay</button>
        </div>

        <div class="settings-section">
          <p class="settings-label">Services</p>
          <button class="btn btn-secondary" onclick="confirmRestartMopidy()">Restart Mopidy</button>
        </div>

        <div class="settings-section">
          <p class="settings-label">System</p>
          <div class="settings-row">
            <button class="btn btn-secondary" onclick="confirmReboot()">Reboot Pi</button>
            <button class="btn btn-secondary" onclick="confirmShutdown()">Shut Down Pi</button>
          </div>
        </div>
      </div>

      <!-- Sensor configuration view (shown in place of the main view) -->
      <div id="sensor-config" class="sensor-config" style="display:none">
        <label class="cfg-field cfg-check">
          <input type="checkbox" id="cfg-enabled"> Enabled (drives auto power-on)
        </label>
        <label class="cfg-field">
          <span>I&sup2;C address</span>
          <input type="text" id="cfg-address" autocomplete="off" spellcheck="false" placeholder="0x48">
        </label>
        <label class="cfg-field">
          <span>Channel (A0&ndash;A3)</span>
          <input type="number" id="cfg-channel" min="0" max="3" step="1">
        </label>
        <label class="cfg-field">
          <span>Gain (1, 2, 4, 8, 16)</span>
          <input type="number" id="cfg-gain" step="1">
        </label>
        <div class="cfg-field">
          <span>ON threshold (V)</span>
          <div class="cfg-tune-row">
            <input type="number" id="cfg-on" step="0.001">
            <button class="btn btn-secondary tune-btn" onclick="tuneThreshold('on')">Tune</button>
          </div>
        </div>
        <div class="cfg-field">
          <span>OFF threshold (V)</span>
          <div class="cfg-tune-row">
            <input type="number" id="cfg-off" step="0.001">
            <button class="btn btn-secondary tune-btn" onclick="tuneThreshold('off')">Tune</button>
          </div>
        </div>
        <p id="sensor-tune-msg" class="sensor-msg"></p>
        <button class="btn btn-primary" id="sensor-save-btn" onclick="saveSensorConfig()" disabled>Save</button>
      </div>
    </div>
  </div>

  <!-- Generic confirmation modal -->
  <div id="confirm-overlay" class="modal-overlay">
    <div class="modal">
      <h2 id="confirm-title">Are you sure?</h2>
      <p id="confirm-message"></p>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="confirm-cancel">Cancel</button>
        <button class="btn" id="confirm-ok">Confirm</button>
      </div>
    </div>
  </div>

  <!-- Register badge modal -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <h2>Register Badge?</h2>
      <p>Badge detected:</p>
      <div id="modal-uid" class="uid-display"></div>
      <p>This will be registered as slot <strong id="modal-slot"></strong>.</p>
      <div id="modal-quickplay" style="margin-bottom:0.5rem;font-size:0.85rem;color:#aaa;"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="modal-dismiss">Dismiss</button>
        <button class="btn btn-primary" id="modal-register">Register</button>
      </div>
    </div>
  </div>

  <!-- Link badge modal -->
  <div id="link-overlay" class="modal-overlay">
    <div class="modal link-modal">
      <h2>Link Badge <span id="link-slot-label"></span></h2>
      <input type="text" class="link-search" id="link-search" placeholder="Search artists…" autocomplete="off" spellcheck="false">
      <div id="link-results" class="link-results"></div>
      <div id="link-tray" class="link-tray"></div>
      <div class="modal-actions">
        <button class="btn btn-secondary" id="link-dismiss">Cancel</button>
        <button class="btn btn-primary" id="link-save">Save</button>
      </div>
    </div>
  </div>

  <script>
    let badges = [];
    let quickplay = [];
    let pendingUID = null;
    let linkSlot = -1;
    let allArtists = null;
    let albumCache = {};
    let expandedArtists = new Set();
    let linkSelection = [];
    let linkShuffle = false;

    // ── IR Controller ─────────────────────────────────────────────────────────

    async function loadIR() {
      try {
        const res = await fetch('/api/ir');
        if (!res.ok) return;
        const items = await res.json();
        if (!Array.isArray(items) || items.length === 0) return;
        const groups = {};
        for (const {name, class: cls} of items) {
          const key = cls || '';
          (groups[key] = groups[key] || []).push(name);
        }
        const section = document.getElementById('ir-controller');
        document.getElementById('ir-grid').innerHTML = Object.entries(groups)
          .map(([cls, names]) => {
            const header = cls ? `<p class="ir-class">${escapeHtml(cls)}</p>` : '';
            const buttons = names.map(n => `<button class="ir-btn" onclick="sendIR('${escapeAttr(n)}')">${escapeHtml(n)}</button>`).join('');
            return header + buttons;
          })
          .join('');
        section.style.display = '';
      } catch (e) {
        console.error('[IR] fetch error:', e);
      }
    }

    async function sendIR(fn) {
      const btn = [...document.querySelectorAll('.ir-btn')].find(b => b.textContent === fn);
      if (btn) btn.classList.add('sending');
      // Volume commands step 3 increments per press, matching the physical buttons.
      const count = (fn === 'volumeUp' || fn === 'volumeDown') ? 3 : 1;
      let path = '/api/ir/' + encodeURIComponent(fn);
      if (count > 1) path += '?count=' + count;
      try {
        await fetch(path, { method: 'POST' });
      } finally {
        if (btn) btn.classList.remove('sending');
      }
    }

    // ── Stereo status ─────────────────────────────────────────────────────────

    async function checkStereo() {
      const btn = document.getElementById('stereo-check-btn');
      const badge = document.getElementById('stereo-status');
      btn.disabled = true;
      badge.style.display = '';
      badge.className = 'stereo-badge checking';
      badge.innerHTML = '<span class="spinner"></span>Checking…';
      try {
        const res = await fetch('/api/stereo');
        if (!res.ok) throw new Error('status ' + res.status);
        const data = await res.json();
        // data.on is true (on), false (off), or null (sensor unavailable).
        // data.voltage is present (volts) only in ads1115 mode — show it to aid tuning.
        const volts = (typeof data.voltage === 'number') ? ` (${data.voltage.toFixed(3)} V)` : '';
        if (data.on === true) {
          badge.textContent = 'Stereo is ON' + volts;
          badge.className = 'stereo-badge on';
        } else if (data.on === false) {
          badge.textContent = 'Stereo is OFF' + volts;
          badge.className = 'stereo-badge off';
        } else {
          badge.textContent = 'Sensor unavailable' + volts;
          badge.className = 'stereo-badge unknown';
        }
      } catch (e) {
        console.error('[stereo] fetch error:', e);
        badge.textContent = 'Check failed — try again';
        badge.className = 'stereo-badge error';
      } finally {
        btn.disabled = false;
      }
    }

    // ── Data loading ──────────────────────────────────────────────────────────

    async function loadData() {
      try {
        const [br, qr] = await Promise.all([
          fetch('/api/badges'),
          fetch('/api/quickplay')
        ]);
        badges = br.ok ? (await br.json()).badges : [];
        const qdata = qr.ok ? (await qr.json()) : null;
        console.log('[quickplay] GET response:', JSON.stringify(qdata));
        if (Array.isArray(qdata)) {
          quickplay = qdata;
        } else {
          quickplay = qdata ? (qdata.quickplay || []) : [];
        }
      } catch (e) {
        badges = [];
        quickplay = [];
      }
      render();
    }

    function itemLabel(item) {
      if (!item || !item.artist) return null;
      return item.album ? `${item.artist} / ${item.album}` : item.artist;
    }

    function itemKey(item) {
      return 'a␀' + (item.artist || '') + '␀' + (item.album || '');
    }

    function qpLabel(entry) {
      if (entry && entry.shuffle) return 'Shuffle all';
      const items = entry && entry.items ? entry.items : [];
      if (items.length === 0) return null;
      const first = itemLabel(items[0]);
      return items.length === 1 ? first : `${first} +${items.length - 1} more`;
    }

    // ── Badge list render ─────────────────────────────────────────────────────

    function render() {
      const container = document.getElementById('badges');
      if (badges.length === 0) {
        container.innerHTML = '<p class="empty-msg">No badges registered. Scan a badge to register it.</p>';
        return;
      }
      container.innerHTML = badges.map((uid, i) => {
        const label = qpLabel(quickplay[i]);
        return `<div class="badge-row" id="badge-${i}">
          <span class="slot">#${i}</span>
          <span class="uid">${uid}</span>
          <span class="label${label ? '' : ' unmapped'}">${label || '(unlinked)'}</span>
          <div class="row-actions">
            <button class="play-btn" onclick="playBadge(${i})">&#9654;</button>
            <button class="link-btn" onclick="openLinkModal(${i})">Link Music</button>
            <button class="remove-btn" onclick="removeBadge(${i})">Remove</button>
          </div>
        </div>`;
      }).join('');
    }

    async function playBadge(index) {
      await fetch('/api/quickplay/' + index, { method: 'POST' });
    }

    async function removeBadge(index) {
      await fetch('/api/badges/' + index, { method: 'DELETE' });
      await loadData();
    }

    // ── Settings modal ──────────────────────────────────────────────────────

    let settingsView = 'main';   // 'main' | 'sensor'

    function openSettings() {
      showSettingsMain();   // always open on the main view
      document.getElementById('settings-overlay').classList.add('visible');
    }
    function closeSettings() {
      document.getElementById('settings-overlay').classList.remove('visible');
    }

    // The top-right corner button closes the modal on the main view, or steps
    // back to the main view from the sensor-config view.
    function settingsCornerAction() {
      if (settingsView === 'sensor') showSettingsMain();
      else closeSettings();
    }

    function setCornerButton(mode) {
      const btn = document.getElementById('settings-corner-btn');
      if (mode === 'back') {
        btn.innerHTML = '&#8592;';            // ← back arrow
        btn.setAttribute('aria-label', 'Back');
      } else {
        btn.innerHTML = '&times;';            // × close
        btn.setAttribute('aria-label', 'Close');
      }
    }

    function showSettingsMain() {
      settingsView = 'main';
      document.getElementById('sensor-config').style.display = 'none';
      document.getElementById('settings-main').style.display = '';
      document.getElementById('settings-title').textContent = 'Settings';
      setCornerButton('close');
    }

    async function showSensorConfig() {
      settingsView = 'sensor';
      document.getElementById('settings-main').style.display = 'none';
      document.getElementById('sensor-config').style.display = '';
      document.getElementById('settings-title').textContent = 'Configure Sensor';
      setCornerButton('back');
      if (!sensorConfigLoaded) await loadSensorConfig();
    }

    // ── Generic confirm modal ───────────────────────────────────────────────

    let confirmCallback = null;
    function showConfirm(title, message, okLabel, danger, onConfirm) {
      document.getElementById('confirm-title').textContent = title;
      document.getElementById('confirm-message').textContent = message;
      const ok = document.getElementById('confirm-ok');
      ok.textContent = okLabel;
      ok.style.background = danger ? '#8b0000' : '#0066cc';
      ok.style.color = '#fff';
      confirmCallback = onConfirm;
      document.getElementById('confirm-overlay').classList.add('visible');
    }
    document.getElementById('confirm-cancel').addEventListener('click', () => {
      confirmCallback = null;
      document.getElementById('confirm-overlay').classList.remove('visible');
    });
    document.getElementById('confirm-ok').addEventListener('click', async () => {
      const cb = confirmCallback;
      confirmCallback = null;
      document.getElementById('confirm-overlay').classList.remove('visible');
      if (cb) await cb();
    });

    function confirmClearQuickplay() {
      showConfirm('Clear Quickplay List?',
        'This will remove all quickplay entries from the Pi server. Registered badges will remain but will be unlinked.',
        'Clear', true, async () => {
          await fetch('/api/quickplay', { method: 'DELETE' });
          await loadData();
        });
    }

    function confirmRestartMopidy() {
      showConfirm('Restart Mopidy?',
        'This restarts the music service on the Pi. Playback will stop briefly.',
        'Restart', false, () => systemAction('/api/service/mopidy/restart', 'Mopidy restart'));
    }

    function confirmReboot() {
      showConfirm('Reboot the Raspberry Pi?',
        'The server will be unreachable for ~30s while it restarts.',
        'Reboot', true, () => systemAction('/api/system/reboot', 'Reboot'));
    }

    function confirmShutdown() {
      showConfirm('Shut Down the Raspberry Pi?',
        'The server will power off and stay off until it is manually powered on again.',
        'Shut Down', true, () => systemAction('/api/system/shutdown', 'Shutdown'));
    }

    async function systemAction(path, label) {
      try {
        const res = await fetch(path, { method: 'POST' });
        if (res.status === 401) {
          alert(label + ' failed: the Pi needs passwordless sudo for this command. See the piserver README.');
        } else if (!res.ok) {
          alert(label + ' request failed (status ' + res.status + ').');
        }
      } catch (e) {
        // The connection commonly drops as the Pi goes down — that's expected.
      }
    }

    // ── Sensor configuration ────────────────────────────────────────────────

    let sensorConfigLoaded = false;
    let sensorBaseline = null;

    function sensorFormValues() {
      return {
        enabled: document.getElementById('cfg-enabled').checked,
        address: document.getElementById('cfg-address').value.trim(),
        channel: document.getElementById('cfg-channel').value,
        gain: document.getElementById('cfg-gain').value,
        on_threshold: document.getElementById('cfg-on').value,
        off_threshold: document.getElementById('cfg-off').value,
      };
    }

    function sensorIsDirty() {
      if (!sensorBaseline) return false;
      const cur = sensorFormValues();
      return Object.keys(cur).some(k => String(cur[k]) !== String(sensorBaseline[k]));
    }

    function refreshSensorSaveState() {
      document.getElementById('sensor-save-btn').disabled = !sensorIsDirty();
    }

    async function loadSensorConfig() {
      const msg = document.getElementById('sensor-tune-msg');
      try {
        const res = await fetch('/api/stereo/config');
        if (!res.ok) throw new Error('status ' + res.status);
        const cfg = await res.json();
        document.getElementById('cfg-enabled').checked = !!cfg.enabled;
        document.getElementById('cfg-address').value = cfg.address ?? '';
        document.getElementById('cfg-channel').value = cfg.channel ?? 0;
        document.getElementById('cfg-gain').value = cfg.gain ?? 1;
        document.getElementById('cfg-on').value = cfg.on_threshold ?? '';
        document.getElementById('cfg-off').value = cfg.off_threshold ?? '';
        sensorBaseline = sensorFormValues();
        sensorConfigLoaded = true;
        msg.className = 'sensor-msg';
        msg.textContent = '';
      } catch (e) {
        msg.className = 'sensor-msg error';
        msg.textContent = 'Failed to load sensor config.';
      }
      refreshSensorSaveState();
    }

    async function tuneThreshold(which) {
      const msg = document.getElementById('sensor-tune-msg');
      const btns = document.querySelectorAll('.tune-btn');
      btns.forEach(b => b.disabled = true);
      msg.className = 'sensor-msg';
      msg.textContent = 'Sampling… hold the stereo in its ' + which.toUpperCase() + ' state.';
      try {
        const res = await fetch('/api/stereo/sample', { method: 'POST' });
        if (!res.ok) throw new Error('status ' + res.status);
        const s = await res.json();
        const suggested = which === 'on' ? s.as_on_threshold : s.as_off_threshold;
        document.getElementById(which === 'on' ? 'cfg-on' : 'cfg-off').value = suggested;
        msg.textContent = `Sampled ${s.count}: mean ${s.mean} V, range ${s.min}–${s.max} V → `
          + `${which.toUpperCase()} threshold ${suggested} V`;
        refreshSensorSaveState();
      } catch (e) {
        msg.className = 'sensor-msg error';
        msg.textContent = 'Sampling failed — is the ADC connected?';
      } finally {
        btns.forEach(b => b.disabled = false);
      }
    }

    async function saveSensorConfig() {
      const btn = document.getElementById('sensor-save-btn');
      const msg = document.getElementById('sensor-tune-msg');
      const v = sensorFormValues();
      const payload = {
        enabled: v.enabled,
        address: v.address,
        channel: parseInt(v.channel, 10),
        gain: parseInt(v.gain, 10),
        on_threshold: parseFloat(v.on_threshold),
        off_threshold: parseFloat(v.off_threshold),
      };
      btn.disabled = true;
      msg.className = 'sensor-msg';
      msg.textContent = 'Saving…';
      try {
        const res = await fetch('/api/stereo/config', {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload),
        });
        if (!res.ok) throw new Error('status ' + res.status);
        sensorBaseline = sensorFormValues();
        msg.textContent = 'Saved.';
      } catch (e) {
        msg.className = 'sensor-msg error';
        msg.textContent = 'Save failed.';
      }
      refreshSensorSaveState();
    }

    // Enable the Save button as soon as any field diverges from what was loaded.
    ['cfg-enabled','cfg-address','cfg-channel','cfg-gain','cfg-on','cfg-off'].forEach(id => {
      const el = document.getElementById(id);
      el.addEventListener('input', refreshSensorSaveState);
      el.addEventListener('change', refreshSensorSaveState);
    });

    // ── Register modal ────────────────────────────────────────────────────────

    document.getElementById('modal-register').addEventListener('click', async () => {
      if (!pendingUID) return;
      await fetch('/api/badges', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ uid: pendingUID })
      });
      pendingUID = null;
      document.getElementById('modal-overlay').classList.remove('visible');
      await loadData();
      // Newly registered badge lands in the last slot — jump straight to linking music.
      openLinkModal(badges.length - 1);
    });

    document.getElementById('modal-dismiss').addEventListener('click', () => {
      pendingUID = null;
      document.getElementById('modal-overlay').classList.remove('visible');
    });

    // ── Link modal ────────────────────────────────────────────────────────────

    async function openLinkModal(slotIndex) {
      linkSlot = slotIndex;
      // Start from the entry's current state so opening an existing link edits it.
      const existing = quickplay[slotIndex] || {};
      linkShuffle = !!existing.shuffle;
      linkSelection = existing.items ? existing.items.map(i => ({...i})) : [];
      expandedArtists.clear();  // every open starts with all artists collapsed
      document.getElementById('link-slot-label').textContent = '#' + slotIndex;
      document.getElementById('link-search').value = '';
      document.getElementById('link-results').innerHTML = '<div class="link-results-empty">Loading artists…</div>';
      renderTray();
      document.getElementById('link-overlay').classList.add('visible');
      document.getElementById('link-search').focus();

      if (!allArtists) {
        try {
          const res = await fetch('/api/artists');
          const data = res.ok ? await res.json() : null;
          allArtists = data ? (data.artists || []).sort() : [];
        } catch (e) {
          allArtists = [];
        }
      }
      renderLinkResults('');
    }

    document.getElementById('link-dismiss').addEventListener('click', () => {
      document.getElementById('link-overlay').classList.remove('visible');
    });

    document.getElementById('link-search').addEventListener('input', (e) => {
      renderLinkResults(e.target.value);
    });

    function renderLinkResults(query) {
      const container = document.getElementById('link-results');
      const q = query.trim().toLowerCase();
      const filtered = q
        ? allArtists.filter(a => a.toLowerCase().includes(q))
        : allArtists;

      if (filtered.length === 0) {
        container.innerHTML = '<div class="link-results-empty">No artists found</div>';
        return;
      }

      let html = `<div class="link-item special${linkShuffle ? ' selected' : ''}" onclick="toggleShuffleAll()">
        <span>Shuffle all</span>
        <span class="check">${linkShuffle ? '✓' : ''}</span>
      </div>`;
      for (const artist of filtered) {
        const expanded = expandedArtists.has(artist);
        html += `<div class="link-item artist" onclick="toggleArtist(this,'${escapeAttr(artist)}')">
          <span>${escapeHtml(artist)}</span>
          <span class="expand-icon">${expanded ? '▾' : '▸'}</span>
        </div>`;
        if (expanded) {
          html += albumRows(artist, albumCache[artist]); // null=error, []=none, [...]=albums
        }
      }
      container.innerHTML = html;
    }

    async function toggleArtist(el, artist) {
      if (expandedArtists.has(artist)) {
        expandedArtists.delete(artist);
        renderLinkResults(document.getElementById('link-search').value);
        return;
      }
      // Expanding: fetch albums unless we already have a good cached list.
      // null is the error sentinel, so re-fetch on those too (retry).
      if (albumCache[artist] === undefined || albumCache[artist] === null) {
        el.querySelector('.expand-icon').textContent = '…';
        try {
          const encoded = encodeURIComponent(artist);
          const res = await fetch('/api/artists/' + encoded + '/albums');
          console.log('[albums]', artist, res.status, res.ok);
          if (res.ok) {
            const data = await res.json();
            console.log('[albums] data:', data);
            albumCache[artist] = data.albums || [];
          } else {
            albumCache[artist] = null; // error sentinel — allows retry on next expand
          }
        } catch (e) {
          console.error('[albums] fetch error:', e);
          albumCache[artist] = null;
        }
      }
      expandedArtists.add(artist);
      renderLinkResults(document.getElementById('link-search').value);
    }

    function isSelected(item) {
      return linkSelection.some(s => itemKey(s) === itemKey(item));
    }

    // Serialize an object as JSON safe to embed in a double-quoted HTML attribute.
    function attrJSON(obj) {
      return JSON.stringify(obj)
        .replace(/&/g, '&amp;').replace(/"/g, '&quot;')
        .replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // Render a selectable result row: a check marker when the item is in the
    // current selection, and a click that toggles it in the tray.
    function row(item, extraClass, text) {
      const sel = isSelected(item);
      return `<div class="link-item ${extraClass}${sel ? ' selected' : ''}" onclick="toggleItem(${attrJSON(item)})">
        <span>${escapeHtml(text)}</span>
        <span class="check">${sel ? '✓' : ''}</span>
      </div>`;
    }

    function albumRows(artist, albums) {
      if (albums === null) {
        return `<div class="link-item album" style="color:#e05555;cursor:default">Failed to load albums — check console</div>`;
      }
      let html = row({artist, album:null}, 'album', 'All albums by ' + artist);
      for (const album of albums) {
        html += row({artist, album}, 'album', album);
      }
      return html;
    }

    function toggleItem(item) {
      const key = itemKey(item);
      const at = linkSelection.findIndex(s => itemKey(s) === key);
      if (at >= 0) {
        linkSelection.splice(at, 1);
      } else {
        // Picking a specific item is mutually exclusive with shuffle-all.
        linkShuffle = false;
        linkSelection.push(item);
      }
      renderLinkResults(document.getElementById('link-search').value);
      renderTray();
    }

    function toggleShuffleAll() {
      linkShuffle = !linkShuffle;
      // Shuffle-all is the whole entry — it can't coexist with specific picks.
      if (linkShuffle) linkSelection = [];
      renderLinkResults(document.getElementById('link-search').value);
      renderTray();
    }

    function renderTray() {
      const tray = document.getElementById('link-tray');
      if (linkShuffle) {
        tray.innerHTML =
          `<span class="tray-chip">Shuffle all<button onclick="toggleShuffleAll()" aria-label="Remove">×</button></span>`;
        return;
      }
      tray.innerHTML = linkSelection.map((item, i) =>
        `<span class="tray-chip">${escapeHtml(itemLabel(item))}<button onclick="removeSelected(${i})" aria-label="Remove">×</button></span>`
      ).join('');
    }

    function removeSelected(i) {
      linkSelection.splice(i, 1);
      renderLinkResults(document.getElementById('link-search').value);
      renderTray();
    }

    function showRowLoading(index) {
      const row = document.getElementById('badge-' + index);
      if (!row) return;
      const label = row.querySelector('.label');
      if (label) {
        label.className = 'label loading';
        label.innerHTML = '<span class="spinner"></span>Saving…';
      }
    }

    async function saveLinkSelection() {
      document.getElementById('link-overlay').classList.remove('visible');
      showRowLoading(linkSlot);
      const res = await fetch('/api/quickplay/' + linkSlot, {
        method: 'PUT',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(linkShuffle ? { shuffle: true } : { items: linkSelection })
      });
      if (!res.ok) {
        console.error('[quickplay] PUT failed:', res.status, await res.text());
        alert('Failed to save quickplay entry (slot ' + linkSlot + '). Check serial log for details.');
      }
      await loadData();
    }

    document.getElementById('link-save').addEventListener('click', saveLinkSelection);

    function escapeHtml(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function escapeAttr(s) {
      return String(s).replace(/\\/g,'\\\\').replace(/'/g,"\\'");
    }

    // ── WebSocket ─────────────────────────────────────────────────────────────

    function connectWS() {
      const ws = new WebSocket('ws://' + location.host + '/ws');
      const statusEl = document.getElementById('ws-status');

      ws.addEventListener('open', () => {
        statusEl.textContent = 'connected';
        statusEl.className = 'ws-badge connected';
      });

      ws.addEventListener('close', () => {
        statusEl.textContent = 'disconnected';
        statusEl.className = 'ws-badge disconnected';
        setTimeout(connectWS, 2000);
      });

      ws.addEventListener('message', (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        if (msg.type === 'badge_scan') {
          const row = document.getElementById('badge-' + msg.index);
          if (row) {
            row.classList.add('active');
            setTimeout(() => row.classList.remove('active'), 7000);
          }
        } else if (msg.type === 'unknown_badge') {
          pendingUID = msg.uid;
          const slot = badges.length;
          document.getElementById('modal-uid').textContent = msg.uid;
          document.getElementById('modal-slot').textContent = '#' + slot;
          const qp = quickplay[slot];
          const label = qpLabel(qp);
          document.getElementById('modal-quickplay').textContent =
            label ? 'Quickplay entry: ' + label : '';
          document.getElementById('modal-overlay').classList.add('visible');
        }
      });
    }

    async function loadIP() {
      try {
        const res = await fetch('/ip');
        if (!res.ok) return;
        const { ip } = await res.json();
        if (!ip) return;
        const el = document.getElementById('device-ip');
        el.textContent = ip;
        el.style.display = '';
      } catch (e) {
        // Leave the badge hidden if the IP can't be fetched.
      }
    }

    loadData();
    loadIR();
    loadIP();
    connectWS();
  </script>
</body>
</html>
